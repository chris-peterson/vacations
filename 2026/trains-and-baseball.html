<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midwest Amtrak Baseball Loop — April 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231a1a18'/><circle cx='50' cy='50' r='44' fill='none' stroke='%23d4a847' stroke-width='2.5'/><circle cx='50' cy='50' r='40' fill='none' stroke='%23d4a847' stroke-width='0.8' opacity='0.4'/><path d='M 37,14 C 40,26 44,38 50,50 C 44,62 40,74 37,86' fill='none' stroke='%23d4a847' stroke-width='2.5' stroke-linecap='round' opacity='0.7'/><path d='M 63,14 C 60,26 56,38 50,50 C 56,62 60,74 63,86' fill='none' stroke='%23d4a847' stroke-width='2.5' stroke-linecap='round' opacity='0.7'/><line x1='12' y1='62' x2='88' y2='38' stroke='%23d4a847' stroke-width='3' stroke-linecap='round'/><line x1='12' y1='62' x2='88' y2='38' stroke='%231a1a18' stroke-width='1' stroke-dasharray='1 5' stroke-linecap='round'/><circle cx='28' cy='54' r='1.5' fill='%23d4a847' opacity='0.5'/><circle cx='72' cy='42' r='1.5' fill='%23d4a847' opacity='0.5'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0c1117;
    --slate: #161d27;
    --card-dark: #1c2430;
    --field: #1a5a3a;
    --field-deep: #133d28;
    --dirt: #b8926a;
    --chalk: #f5f0e1;
    --cream: #e8e0cc;
    --leather: #c8956a;
    --gold: #d4a847;
    --gold-dim: rgba(212,168,71,0.35);
    --red: #bf3636;
    --rail-purple: #3d2c5e;
    --rail-surface: #2a2240;
    --paper: #e8dcc8;
    --paper-dark: #d4c4a8;
    --paper-ink: #2c2418;
    --paper-muted: #6b5d4a;
    --paper-rule: #c4b494;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--ink);
    color: var(--chalk);
    min-height: 100vh;
    position: relative;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  .hero {
    background:
      radial-gradient(ellipse 100% 80% at 50% 120%, var(--field) 0%, transparent 60%),
      var(--ink);
    text-align: center;
    padding: 3.5rem 2rem 2.5rem;
    position: relative;
    border-bottom: 1px solid rgba(212,168,71,0.08);
  }
  .hero-rule {
    width: 60px; height: 2px; background: var(--gold); margin: 0 auto 1.2rem;
    opacity: 0.6;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 400; text-transform: uppercase;
    letter-spacing: 0.08em; line-height: 1.0; color: var(--chalk);
  }
  .hero h1 em { font-style: normal; color: var(--gold); }
  .hero .subtitle {
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dirt); margin-top: 0.6rem;
  }
  .hero .dates {
    margin-top: 0.9rem; font-size: 1rem; color: var(--cream);
    font-weight: 500; letter-spacing: 0.02em;
  }
  .hero .all-times {
    margin-top: 0.3rem; font-size: 0.75rem; color: var(--dirt); opacity: 0.7;
    font-family: 'DM Mono', monospace;
  }


  .main-layout {
    display: flex; max-width: 1400px; margin: 0 auto;
    padding: 2rem 1.5rem; gap: 2rem; align-items: flex-start;
  }
  .map-panel {
    flex: 0 0 55%; position: sticky;
    top: 1.2rem;
    align-self: flex-start;
    max-height: calc(100vh - 2.4rem);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .timeline-panel { flex: 1; min-width: 0; }

  .map-container {
    background:
      radial-gradient(ellipse at 30% 40%, rgba(26,90,58,0.08), transparent 60%),
      var(--slate);
    border-radius: 6px 6px 0 0;
    border: 1px solid rgba(245,240,225,0.06);
    border-bottom: none;
    overflow: hidden; padding: 1rem;
    position: relative;
    flex-shrink: 1;
    max-height: 45vh;
  }
  .map-container::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
    border-radius: 6px 6px 0 0;
  }
  .map-container svg { width: 100%; height: auto; display: block; position: relative; z-index: 1; }

  /* Scrapbook panel below map */
  .scrapbook {
    background:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.06'/%3E%3C/svg%3E"),
      linear-gradient(168deg, #e8dcc8 0%, #ddd0b8 40%, #d8caac 100%);
    background-size: 150px, 100%;
    border-radius: 0 0 6px 6px;
    border: 1px solid rgba(180,160,120,0.3);
    border-top: none;
    margin-top: 3px;
    padding: 1.2rem 1.1rem 1rem;
    position: relative;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }
  .scrapbook::before {
    content: '';
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 45% 40% at 85% 20%, rgba(160,120,60,0.1), transparent),
      radial-gradient(ellipse 30% 35% at 15% 75%, rgba(140,100,40,0.07), transparent),
      radial-gradient(circle at 72% 80%, rgba(120,90,40,0.06), transparent 60%);
  }
  .scrapbook::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 8px;
    z-index: 3; pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15), transparent);
  }

  .scrap-header {
    display: flex; align-items: baseline; gap: 0.6rem;
    margin-bottom: 0.7rem; padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--paper-ink);
    position: relative; z-index: 1;
  }
  .scrap-header::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: var(--paper-ink); opacity: 0.25;
  }
  .scrap-city {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
    color: var(--paper-ink); letter-spacing: 0.06em;
    line-height: 1;
  }
  .scrap-date {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: var(--paper-muted); letter-spacing: 0.06em;
  }
  .scrap-badge {
    font-family: 'DM Mono', monospace; font-size: 0.55rem;
    background: var(--field-deep); color: var(--gold);
    padding: 0.1rem 0.4rem; border-radius: 1px;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-left: auto;
  }

  .scrap-body {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s;
    position: relative; z-index: 1;
  }
  .scrap-body.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .clipping {
    background:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='s'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23s)' opacity='0.03'/%3E%3C/svg%3E"),
      linear-gradient(145deg, rgba(255,255,255,0.32), rgba(245,235,215,0.15) 40%, rgba(230,218,195,0.08));
    border: none;
    border-left: 2px solid rgba(180,160,120,0.2);
    border-bottom: 1px solid rgba(180,160,120,0.15);
    padding: 0.65rem 0.75rem;
    margin-bottom: 0.6rem;
    position: relative;
    box-shadow:
      2px 2px 4px rgba(0,0,0,0.08),
      inset 0 0 20px rgba(160,130,80,0.04);
  }
  .clipping::before {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 3px; pointer-events: none;
    background: url("data:image/svg+xml,%3Csvg width='3' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2,0 C1,8 3,16 1,24 C0,32 2,40 1,48 C3,56 0,64 2,72 C1,80 3,88 1,96 C0,104 2,112 1,120 C3,128 0,136 2,144 C1,152 3,160 1,168 C0,176 2,184 1,192 C3,200 2,200 2,200 L3,200 L3,0 Z' fill='%23e8dcc8'/%3E%3C/svg%3E");
    background-size: 3px 200px;
  }
  .clipping:nth-child(odd) { transform: rotate(-0.4deg); }
  .clipping:nth-child(even) { transform: rotate(0.5deg); }
  .clipping:nth-child(3n) { transform: rotate(-0.2deg) translateX(1px); }
  .clipping:last-child { margin-bottom: 0; }

  .clipping-label {
    font-family: 'DM Mono', monospace; font-size: 0.55rem;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--paper-muted); margin-bottom: 0.3rem;
    border-bottom: 1px solid var(--paper-rule);
    padding-bottom: 0.2rem;
  }
  .clipping p {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; line-height: 1.55;
    color: var(--paper-ink); opacity: 0.85;
  }
  .clipping p + p { margin-top: 0.25rem; }

  .clipping-tip {
    display: flex; gap: 0.4rem; align-items: flex-start;
    font-size: 0.75rem; line-height: 1.45;
    color: var(--paper-ink); opacity: 0.8;
    margin-bottom: 0.25rem;
    font-family: 'DM Sans', sans-serif;
  }
  .clipping-tip:last-child { margin-bottom: 0; }
  .clipping-tip-icon { flex-shrink: 0; font-size: 0.8rem; }

  .clipping a, .clipping-tip a {
    color: var(--paper-ink); text-decoration: underline;
    text-decoration-color: var(--paper-rule);
    text-underline-offset: 2px;
    transition: text-decoration-color 0.2s;
  }
  .clipping a:hover, .clipping-tip a:hover {
    text-decoration-color: var(--paper-ink);
  }

  .scrap-ornament {
    text-align: center; padding: 0.3rem 0;
    font-family: 'DM Mono', monospace; font-size: 0.6rem;
    color: var(--paper-rule); letter-spacing: 0.5em;
  }

  /* Tape effect on corners */
  .tape {
    position: absolute; width: 42px; height: 14px;
    background: linear-gradient(180deg, rgba(212,190,120,0.3), rgba(200,175,100,0.18));
    border: 1px solid rgba(212,168,71,0.1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    z-index: 4;
  }
  .tape-tl { top: -5px; left: 12px; transform: rotate(-8deg); }
  .tape-tr { top: -5px; right: 12px; transform: rotate(5deg); }

  .state { fill: rgba(245,240,225,0.025); stroke: rgba(245,240,225,0.05); stroke-width: 0.5; stroke-linejoin: round; }
  .state-route { fill: rgba(26,90,58,0.12); stroke: rgba(245,240,225,0.07); }
  .map-route-done { stroke: var(--gold); opacity: 0.35; }
  .map-route-future { stroke: rgba(245,240,225,0.15); stroke-dasharray: 6 5; }
  .map-route-glow {
    stroke: var(--gold); stroke-width: 4; fill: none;
    opacity: 0.45; filter: url(#routeGlow);
    stroke-linecap: round;
    pointer-events: none;
  }
  .city-dot { fill: rgba(245,240,225,0.2); transition: fill 0.4s, r 0.3s; }
  .city-dot.active { fill: var(--gold); }
  .city-dot.visited { fill: var(--gold); opacity: 0.5; }
  .city-dot.game-city { stroke: var(--field); stroke-width: 1.5; }
  .city-label {
    font-family: 'DM Mono', monospace; font-size: 7px; fill: var(--cream);
    text-anchor: middle; opacity: 0.5; pointer-events: none;
    transition: opacity 0.4s; letter-spacing: 0.08em;
  }
  .city-label.active { opacity: 1; fill: var(--gold); font-size: 8px; }
  @keyframes pulse-glow {
    0%, 100% { r: 12; opacity: 0.3; }
    50% { r: 18; opacity: 0; }
  }
  .pulse-ring { fill: var(--gold); animation: pulse-glow 2.5s ease-in-out infinite; }
  @keyframes throb-ring {
    0%, 100% { r: 16; opacity: 0.5; }
    50% { r: 28; opacity: 0; }
  }
  @keyframes throb-ring-2 {
    0%, 100% { r: 12; opacity: 0.3; }
    50% { r: 22; opacity: 0; }
  }
  .pulse-ring.throb { fill: var(--field); animation: throb-ring 1.8s ease-in-out infinite; }
  #throbRing2 { display: none; fill: var(--gold); }
  #throbRing2.throb { display: block; animation: throb-ring-2 1.8s ease-in-out infinite 0.4s; }

  .timeline { position: relative; padding: 0.5rem 0 3rem; }
  .timeline::before {
    content: ''; position: absolute; left: 11px; top: 0; bottom: 0; width: 1px;
    background: rgba(245,240,225,0.07);
  }

  .day-group {
    margin-bottom: 1.8rem; position: relative;
    cursor: pointer;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .day-group.visible { opacity: 1; transform: translateY(0); }
  .day-group.visible.past { opacity: 0.4; }
  .day-group.past .card {
    position: relative;
    overflow: hidden;
  }
  .day-group.past .card::after {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, transparent 50%, var(--ink) 50%);
    opacity: 0.5;
  }
  .day-group.past .day-dot { opacity: 0.3; }
  .day-group.past:hover { opacity: 0.7; }
  .day-group.active { opacity: 1; }
  .day-group.active .day-dot {
    background: var(--gold); opacity: 1;
    box-shadow: 0 0 0 3px rgba(212,168,71,0.2);
  }
  .day-group.active .day-label { color: var(--gold); }
  .day-group.active .card { border-color: rgba(212,168,71,0.25); }
  .day-group.active .card--game { border-color: rgba(212,168,71,0.35); }

  .day-header {
    display: flex; align-items: center; gap: 0.65rem;
    margin-bottom: 0.65rem; position: relative; z-index: 1;
  }
  .day-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dirt); opacity: 0.5;
    flex-shrink: 0; margin-left: 8px;
    transition: all 0.3s ease;
  }
  .day-group[data-day] .day-dot { background: var(--gold); opacity: 0.8; }
  .day-label {
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--dirt);
    transition: color 0.3s ease;
  }

  .card {
    margin-left: 32px; margin-bottom: 0.5rem;
    padding: 0.85rem 1rem; position: relative;
    transition: transform 0.2s ease, border-color 0.3s ease;
  }
  .card { cursor: pointer; }
  .card:hover { transform: translateX(3px); }
  .card--active { border-color: rgba(212,168,71,0.4) !important; }

  .card--transit {
    background: var(--rail-surface);
    border: 1px solid rgba(212,168,71,0.06);
    border-left: 3px solid var(--leather);
    border-radius: 2px;
    position: relative;
  }
  .card--transit::before {
    content: '';
    position: absolute; top: 50%; left: -8px;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ink); border: 1px solid rgba(200,149,106,0.3);
    transform: translateY(-50%);
  }

  .card--game {
    background: linear-gradient(135deg, var(--field-deep), #1a4a30);
    border: 1px solid rgba(212,168,71,0.1);
    border-left: 3px solid var(--gold);
    border-radius: 2px;
    position: relative;
  }
  .card--game::before {
    content: '';
    position: absolute; top: 50%; left: -8px;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ink); border: 1px solid var(--gold-dim);
    transform: translateY(-50%);
  }

  .card-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
  .card-icon { font-size: 1rem; flex-shrink: 0; }
  .card-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
    letter-spacing: 0.04em; color: var(--chalk);
  }
  .card--game .card-title { color: var(--gold); font-size: 1.05rem; }

  .card-meta {
    display: flex; flex-wrap: wrap; gap: 0.3rem 0.8rem;
    font-size: 0.78rem; color: var(--dirt);
  }
  .card-meta strong {
    font-family: 'DM Mono', monospace; font-weight: 500;
    color: var(--cream); font-size: 0.75rem;
  }

  .card--game .matchup {
    display: inline-flex; align-items: center; gap: 0.35rem;
    font-family: 'DM Mono', monospace;
    background: rgba(0,0,0,0.3); padding: 0.2rem 0.55rem; border-radius: 2px;
    font-size: 0.7rem; font-weight: 500; color: var(--chalk); margin-top: 0.35rem;
    letter-spacing: 0.06em;
  }
  .matchup .at { color: var(--dirt); font-weight: 400; }

  .sleep-badge {
    display: inline-flex; align-items: center; gap: 0.25rem; margin-top: 0.35rem;
    font-size: 0.7rem; color: var(--dirt); opacity: 0.7;
  }

  /* Mobile inline scrapbook (hidden on desktop) */
  .scrapbook-inline {
    display: none;
  }

  @media (max-width: 900px) {
    .main-layout { flex-direction: column; padding: 1rem; gap: 1rem; }
    .map-panel { position: static; flex: none; max-height: none; }
    .map-panel .scrapbook { display: none; }
    .timeline { padding-left: 0.5rem; }

    .scrapbook-inline {
      display: none;
      background:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.06'/%3E%3C/svg%3E"),
        linear-gradient(168deg, #e8dcc8 0%, #ddd0b8 40%, #d8caac 100%);
      background-size: 150px, 100%;
      border-radius: 6px;
      border: 1px solid rgba(180,160,120,0.3);
      padding: 1rem 1rem 0.8rem;
      margin: 0 0 1.8rem 32px;
      position: relative;
      overflow: hidden;
    }
    .scrapbook-inline::before {
      content: '';
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 45% 40% at 85% 20%, rgba(160,120,60,0.1), transparent),
        radial-gradient(ellipse 30% 35% at 15% 75%, rgba(140,100,40,0.07), transparent);
    }
    .scrapbook-inline.active {
      display: block;
    }
    .scrapbook-inline .scrap-header {
      display: flex; align-items: baseline; gap: 0.6rem;
      margin-bottom: 0.7rem; padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--paper-ink);
      position: relative; z-index: 1;
    }
    .scrapbook-inline .scrap-header::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 1px; background: var(--paper-ink); opacity: 0.25;
    }
    .scrapbook-inline .scrap-city {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
      color: var(--paper-ink); letter-spacing: 0.06em; line-height: 1;
    }
    .scrapbook-inline .scrap-date {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      color: var(--paper-muted); letter-spacing: 0.06em;
    }
    .scrapbook-inline .scrap-body {
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s;
      position: relative; z-index: 1;
    }
    .scrapbook-inline .scrap-body.visible {
      opacity: 1; transform: translateY(0);
    }
  }
  @media (max-width: 480px) {
    .hero { padding: 2.5rem 1rem 2rem; }
    .card { margin-left: 28px; padding: 0.7rem 0.85rem; }
    .scrapbook-inline { margin-left: 28px; }
  }

  .settings-gear {
    position: fixed; bottom: 1rem; right: 1rem; z-index: 300;
    width: 2.2rem; height: 2.2rem; border-radius: 50%;
    background: var(--slate); border: 1px solid rgba(212,168,71,0.15);
    color: var(--dirt); font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.4; transition: opacity 0.2s;
  }
  .settings-gear:hover { opacity: 1; }
  .settings-panel {
    display: none; position: fixed; bottom: 3.8rem; right: 1rem; z-index: 300;
    background: var(--slate); border: 1px solid rgba(212,168,71,0.2);
    border-radius: 6px; padding: 1rem; width: 320px; max-width: calc(100vw - 2rem);
  }
  .settings-panel.open { display: block; }
  .settings-panel label {

  }

  }

<script>
var LIVE = false;

var days = [
  { city: 'seattle',   name: 'Seattle',    date: 'Day 1', cx: 200, cy: 92,  game: false, legs: [],                              reverse: false, throb: false, doneLegs: [],                                          after: null },
  { city: 'seattle',   name: 'In Transit', date: 'Day 2', cx: 200, cy: 92,  game: false, legs: ['route-sea-stp'],                reverse: false, throb: false, doneLegs: [],                                          after: null },
  { city: 'stpaul',    name: 'St. Paul',   date: 'Day 3', cx: 597, cy: 162, game: true,  legs: [],                              reverse: false, throb: true,  doneLegs: ['route-sea-stp'],                           after: null },
  { city: 'chicago',   name: 'Chicago',    date: 'Day 4', cx: 692, cy: 210, game: true,  legs: ['route-stp-mil','route-mil-chi'], reverse: false, throb: false, doneLegs: ['route-sea-stp','route-stp-mil','route-mil-chi'], after: null },
  { city: 'chicago',   name: 'Chicago',    date: 'Day 5', cx: 692, cy: 210, game: true,  legs: [],                              reverse: false, throb: true,  doneLegs: ['route-sea-stp','route-stp-mil','route-mil-chi'], after: null },
  { city: 'milwaukee', name: 'Milwaukee',  date: 'Day 6', cx: 688, cy: 178, game: true,  legs: ['route-mil-chi'],                reverse: true,  throb: false, doneLegs: ['route-sea-stp','route-stp-mil','route-mil-chi'], after: null },
  { city: 'milwaukee', name: 'Milwaukee',  date: 'Day 7', cx: 688, cy: 178, game: false, legs: ['route-stp-mil'],                reverse: true,  throb: false, doneLegs: ['route-sea-stp','route-stp-mil','route-mil-chi'], after: null },
  { city: 'stpaul',    name: 'In Transit', date: 'Day 8', cx: 597, cy: 162, game: false, legs: ['route-sea-stp'],               reverse: true,  throb: false, doneLegs: ['route-sea-stp','route-stp-mil','route-mil-chi'], after: null },
  { city: 'seattle',   name: 'Home!',      date: 'Day 9', cx: 200, cy: 92,  game: false, legs: [],                              reverse: false, throb: false, doneLegs: ['route-sea-stp','route-stp-mil','route-mil-chi'], after: null },
];

var dayDetails = ['', '', '', '', '', '', '', '', ''];

var allLegs = ['route-sea-stp', 'route-stp-mil', 'route-mil-chi'];
var dayGroups = document.querySelectorAll('.day-group[data-day]');
var activeDay = 0;

function activateDay(dayIdx, emoji, opts) {
  opts = opts || {};
  activeDay = dayIdx;
  var day = days[dayIdx];

  // timeline styling
  dayGroups.forEach(function(g) {
    g.classList.remove('active', 'past');
    if (parseInt(g.dataset.day) < dayIdx) g.classList.add('past');
  });
  var target = document.querySelector('.day-group[data-day="' + dayIdx + '"]');
  if (target) target.classList.add('active');

  // map: done legs
  var doneLegIds = new Set(day.doneLegs);
  allLegs.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('map-route-done', doneLegIds.has(id));
    el.classList.toggle('map-route-future', !doneLegIds.has(id));
    el.style.stroke = '';
    el.style.strokeDasharray = '';
    el.style.opacity = '';
  });

  // map: city dots
  var visitedCities = new Set();
  for (var i = 0; i <= dayIdx; i++) visitedCities.add(days[i].city);
  document.querySelectorAll('[data-city]').forEach(function(g) {
    var c = g.dataset.city;
    var dot = g.querySelector('.city-dot');
    var label = g.querySelector('.city-label');
    dot.classList.remove('active', 'visited');
    label.classList.remove('active');
    if (c === day.city) { dot.classList.add('active'); label.classList.add('active'); }
    else if (visitedCities.has(c)) { dot.classList.add('visited'); }
  });

  // map: marker position + emoji
  var faceEast = dayIdx <= 3;
  var g = document.getElementById('trainGroup');
  g.setAttribute('transform', 'translate(' + day.cx + ',' + day.cy + ')' + (faceEast ? ' scale(-1,1)' : ''));
  document.getElementById('trainEmoji').textContent = emoji;

  // map: route glow animation
  document.getElementById('routeGlowLayer').innerHTML = '';
  var pulseRing = document.getElementById('pulseRing');
  var throbRing2 = document.getElementById('throbRing2');
  var showLegs = !opts.skipLegs;
  pulseRing.classList.toggle('throb', day.throb || opts.skipLegs);
  throbRing2.classList.toggle('throb', day.throb || opts.skipLegs);

  if (showLegs && day.legs.length) {
    var layer = document.getElementById('routeGlowLayer');
    var legData = day.legs.map(function(id) {
      var src = document.getElementById(id);
      if (!src) return null;
      var len = Math.round(src.getTotalLength());
      var dash = Math.round(len * 0.2);
      var cycle = dash + len;
      var dur = parseFloat((2 + len / 200).toFixed(1));
      return { id: id, src: src, len: len, dash: dash, cycle: cycle, dur: dur };
    }).filter(Boolean);
    var totalDur = legData.reduce(function(s, d) { return s + d.dur; }, 0);
    var delay = 0;
    legData.forEach(function(d) {
      var clone = d.src.cloneNode(true);
      clone.removeAttribute('id');
      clone.setAttribute('class', 'map-route-glow');
      clone.style.strokeDasharray = d.dash + ' ' + d.len;
      var name = 'glow' + d.id.replace(/[^a-zA-Z0-9]/g, '');
      var from = day.reverse ? 0 : d.cycle;
      var to = day.reverse ? d.cycle : 0;
      var hideTo = day.reverse ? (-d.cycle) : (d.cycle * 2);
      var pct1 = ((d.dur / totalDur) * 100).toFixed(1);
      var style = document.createElement('style');
      if (legData.length === 1) {
        style.textContent = '@keyframes ' + name
          + '{0%{stroke-dashoffset:' + from + '}'
          + '100%{stroke-dashoffset:' + to + '}}';
        clone.style.opacity = '0.45';
      } else {
        style.textContent = '@keyframes ' + name
          + '{0%{stroke-dashoffset:' + from + ';opacity:0.45}'
          + pct1 + '%{stroke-dashoffset:' + to + ';opacity:0.45}'
          + (parseFloat(pct1) + 0.1) + '%{stroke-dashoffset:' + from + ';opacity:0}'
          + '100%{stroke-dashoffset:' + from + ';opacity:0}}';
      }
      layer.appendChild(style);
      clone.style.animation = name + ' ' + totalDur + 's linear ' + delay + 's infinite';
      layer.appendChild(clone);
      delay += d.dur;
    });
  }

  // scrapbook (desktop)
  var body = document.getElementById('scrapBody');
  document.getElementById('scrapCity').textContent = day.name;
  document.getElementById('scrapDate').textContent = day.date;
  var badge = document.querySelector('#scrapbook .scrap-badge');
  if (badge) badge.remove();
  if (day.game) {
    var b = document.createElement('span');
    b.className = 'scrap-badge';
    b.textContent = '\u26be game day';
    document.querySelector('#scrapbook .scrap-header').appendChild(b);
  }
  body.classList.remove('visible');
  setTimeout(function() {
    body.innerHTML = dayDetails[dayIdx] || '';
    document.getElementById('scrapbook').scrollTop = 0;
    void body.offsetHeight;
    body.classList.add('visible');
  }, 150);

  // scrapbook (mobile inline — positioned between day tiles)
  var isMobile = window.matchMedia('(max-width: 900px)').matches;
  var inlineScrap = document.getElementById('scrapbookInline');
  if (isMobile && inlineScrap) {
    var inlineBody = document.getElementById('scrapBodyInline');
    document.getElementById('scrapCityInline').textContent = day.name;
    document.getElementById('scrapDateInline').textContent = day.date;
    var inlineBadge = inlineScrap.querySelector('.scrap-badge');
    if (inlineBadge) inlineBadge.remove();
    if (day.game) {
      var bi = document.createElement('span');
      bi.className = 'scrap-badge';
      bi.textContent = '\u26be game day';
      inlineScrap.querySelector('.scrap-header').appendChild(bi);
    }
    inlineBody.classList.remove('visible');
    inlineScrap.classList.remove('active');
    // Move the inline scrapbook right after the active day-group
    var activeGroup = document.querySelector('.day-group[data-day="' + dayIdx + '"]');
    if (activeGroup) {
      activeGroup.parentNode.insertBefore(inlineScrap, activeGroup.nextSibling);
    }
    setTimeout(function() {
      inlineScrap.classList.add('active');
      inlineBody.innerHTML = dayDetails[dayIdx] || '';
      void inlineBody.offsetHeight;
      inlineBody.classList.add('visible');
    }, 150);
  }
}

document.querySelectorAll('.card').forEach(function(card) {
  card.addEventListener('click', function() {
    var group = card.closest('.day-group[data-day]');
    if (!group) return;
    var dayIdx = parseInt(group.dataset.day);
    if (isNaN(dayIdx)) return;
    var iconEl = card.querySelector('.card-icon');
    var emoji = iconEl ? iconEl.textContent.trim() : '\ud83d\ude82';
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('card--active'); });
    card.classList.add('card--active');
    activateDay(dayIdx, emoji, { skipLegs: card.classList.contains('card--game') });
  });
});

var revealObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      revealObserver.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });

dayGroups.forEach(function(g, i) {
  g.style.transitionDelay = (i * 0.04) + 's';
  revealObserver.observe(g);
});

function getCardEmoji(dayIdx) {
  var group = document.querySelector('.day-group[data-day="' + dayIdx + '"]');
  if (!group) return '\ud83d\ude82';
  var lastCard = group.querySelector('.card:last-of-type');
  var iconEl = lastCard ? lastCard.querySelector('.card-icon') : null;
  return iconEl ? iconEl.textContent.trim() : '\ud83d\ude82';
}

function applyPrivateData(data) {
  if (data.meta) {
    var datesEl = document.getElementById('heroDates');
    if (datesEl && data.meta.dates) datesEl.textContent = data.meta.dates;
    var timesEl = document.getElementById('heroTimesNote');
    if (timesEl && data.meta.allTimesNote) timesEl.textContent = data.meta.allTimesNote;
  }

  if (data.days) {
    data.days.forEach(function(dayData) {
      var i = dayData.index;
      if (i >= days.length) return;
      if (dayData.after != null) days[i].after = dayData.after;
      if (dayData.shortDate) days[i].date = dayData.shortDate;

      var group = document.querySelector('.day-group[data-day="' + i + '"]');
      if (!group) return;

      var label = group.querySelector('.day-label');
      if (label && dayData.date) label.textContent = dayData.date;

      if (dayData.cards) {
        var existingCards = group.querySelectorAll('.card');
        dayData.cards.forEach(function(card, j) {
          if (!existingCards[j]) return;
          var el = existingCards[j];

          var titleEl = el.querySelector('.card-title');
          if (titleEl && card.title) titleEl.textContent = card.title;

          var iconEl = el.querySelector('.card-icon');
          if (iconEl && card.icon) iconEl.textContent = card.icon;

          var metaEl = el.querySelector('.card-meta');
          if (metaEl) {
            var html = '';
            if (card.time) {
              html += '<span><strong>' + card.time + '</strong>';
              if (card.timeNote) html += ' ' + card.timeNote;
              html += '</span>';
            }
            if (card.subtitle) {
              card.subtitle.split('\n').forEach(function(line) {
                html += '<span>' + line + '</span>';
              });
            }
            if (html) metaEl.innerHTML = html;
          }

          var matchupEl = el.querySelector('.matchup');
          if (card.matchup) {
            if (!matchupEl) {
              matchupEl = document.createElement('div');
              matchupEl.className = 'matchup';
              el.appendChild(matchupEl);
            }
            matchupEl.innerHTML = card.matchup.away + ' <span class="at">@</span> ' + card.matchup.home;
          }

          if (card.sleep) {
            var sleepEl = el.querySelector('.sleep-badge');
            if (!sleepEl) {
              sleepEl = document.createElement('div');
              sleepEl.className = 'sleep-badge';
              el.appendChild(sleepEl);
            }
            sleepEl.textContent = (card.sleepIcon || '') + ' ' + card.sleep;
          }
        });
      }
    });
  }

  if (data.dayDetails) {
    for (var i = 0; i < data.dayDetails.length; i++) {
      dayDetails[i] = data.dayDetails[i];
    }
  }
}

function tryFetch(url) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  });
}

function initPage() {
  activeDay = -1;
  activateDay(0, getCardEmoji(0));

  if (LIVE) {
    var now = new Date();
    var liveDay = 0;
    for (var i = days.length - 1; i >= 0; i--) {
      if (days[i].after && now >= new Date(days[i].after + ':00-07:00')) { liveDay = i; break; }
    }
    if (liveDay > 0) {
      var target = document.querySelector('.day-group[data-day="' + liveDay + '"]');
      if (target) setTimeout(function() { target.scrollIntoView({ behavior: 'smooth' }); }, 300);
    }
  }
}

(function loadPrivateData() {
  var privateKey = localStorage.getItem('vacations:privateKey');
  var apiUrl = localStorage.getItem('vacations:apiUrl');

  tryFetch('private-data.json')
    .catch(function() {
      if (!privateKey || !apiUrl) return Promise.reject('no config');
      return tryFetch(apiUrl + '?trip=2026/trains-and-baseball&key=' + encodeURIComponent(privateKey));
    })
    .then(function(data) {
      applyPrivateData(data);
      LIVE = true;
      initPage();
    })
    .catch(function() {
      initPage();
    });
})();

</script>

<button class="settings-gear" aria-label="Settings">&#x2699;</button>
<div class="settings-panel">
  <label for="settingsApiUrl">API URL</label>
  <input type="url" id="settingsApiUrl" placeholder="https://your-site.netlify.app/.netlify/functions/trip">
  <label for="settingsKey">Private Key</label>
  <input type="password" id="settingsKey" placeholder="your-private-key">
  <div class="btn-row">
    <button class="btn-save" id="settingsSave">Save & Reload</button>
    <button class="btn-clear" id="settingsClear">Clear</button>
  </div>
</div>

<script>
var settingsGear = document.querySelector('.settings-gear');
var settingsPanel = document.querySelector('.settings-panel');
settingsGear.addEventListener('click', function() {
  settingsPanel.classList.toggle('open');
  if (settingsPanel.classList.contains('open')) {
    document.getElementById('settingsApiUrl').value = localStorage.getItem('vacations:apiUrl') || '';
    document.getElementById('settingsKey').value = localStorage.getItem('vacations:privateKey') || '';
  }
});
document.getElementById('settingsSave').addEventListener('click', function() {
  var url = document.getElementById('settingsApiUrl').value.trim();
  var key = document.getElementById('settingsKey').value.trim();
  if (url) localStorage.setItem('vacations:apiUrl', url);
  if (key) localStorage.setItem('vacations:privateKey', key);
  settingsPanel.classList.remove('open');
  location.reload();
});
document.getElementById('settingsClear').addEventListener('click', function() {
  localStorage.removeItem('vacations:apiUrl');
  localStorage.removeItem('vacations:privateKey');
  settingsPanel.classList.remove('open');
  location.reload();
});
</script>

</body>
</html>
